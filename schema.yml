  /api/v1/job/:
    get:
      operationId: v1_job_list
      parameters:
      - in: query
        name: employment_type
        schema:
          type: string
          x-spec-enum-id: ed8044b9f2f01d59
          enum:
          - Contract
          - Full Time
          - Internship
          - Part Time
          - Voluntary
        description: |-
          Job Type

          * `Full Time` - Full Time
          * `Part Time` - Part Time
          * `Contract` - Contract
          * `Internship` - Internship
          * `Voluntary` - Voluntary
      - in: query
        name: job_title
        schema:
          type: string
        description: Job Title
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: salary_max
        schema:
          type: string
          format: decimal
          pattern: ^-?\d{0,15}(?:\.\d{0,2})?$
          nullable: true
      - in: query
        name: salary_min
        schema:
          type: string
          format: decimal
          pattern: ^-?\d{0,15}(?:\.\d{0,2})?$
          nullable: true
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: tags__name
        schema:
          type: string
        description: Tag
      tags:
      - v1
      security:
