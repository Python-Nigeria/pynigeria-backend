    get:
      operationId: v1_csrf_token
      tags:
      - auth_v1
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/authentication/login/:
    post:
      operationId: v1_login
      description: |-
        Step 1 — validates email + password.
        Returns tokens immediately if 2FA is off.
        Returns { requires_2fa: true, email } if 2FA is on, so the frontend
        knows to show the TOTP prompt and call LoginTOTPView next.
      tags:
      - auth_v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Login'
          description: ''
