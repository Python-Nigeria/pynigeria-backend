name: CSV to Issues v1 (Idempotent)

on:
  push:
    paths:
      - '.github/data/**/*.csv'

jobs:
  create-issues:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: sudo apt-get install gh -y

      - name: Process CSV files
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          for file in .github/data/*.csv; do
            echo "Processing $file"

            tail -n +2 "$file" | while IFS=, read -r id title body labels milestone
            do
              echo "Checking $id"

              # Check if issue already exists (by ID in title)
              existing=$(gh issue list \
                --search "$id in:title" \
                --json title \
                -q '.[].title')

              if [[ "$existing" == *"$id"* ]]; then
                echo "Skipping existing issue: $id"
              else
                echo "Creating issue: $id"

                # Prepare labels (comma-separated)
                label_list=$(echo $labels | tr ';' ',')

                # Ensure each label exists
                IFS=',' read -ra arr <<< "$label_list"
                for lbl in "${arr[@]}"; do
                  lbl_trim=$(echo "$lbl" | xargs)  # trim spaces
                  exists=$(gh label list --json name -q ".[] | select(.name==\"$lbl_trim\") | .name")
                  if [ -z "$exists" ]; then
                    echo "Creating missing label: $lbl_trim"
                    gh label create "$lbl_trim" --color "f29513"
                  fi
                done

                # Check if milestone exists
                milestone_exists=$(gh milestone list --json title -q ".[] | select(.title==\"$milestone\") | .title")
                if [ -z "$milestone_exists" ]; then
                  echo "Creating missing milestone: $milestone"
                  gh milestone create "$milestone"
                fi

                # Create the issue
                gh issue create \
                  --title "$id $title" \
                  --body "$body" \
                  --label "$label_list" \
                  --milestone "$milestone"
              fi

            done
          done