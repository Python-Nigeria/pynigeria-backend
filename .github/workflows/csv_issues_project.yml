name: CSV to Issues v1 (Idempotent)
on:
  push:
    paths:
      - '.github/data/**/*.csv'
jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Process CSV files
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          REPO="${{ github.repository }}"

          for file in .github/data/*.csv; do
            echo "Processing $file"
            tail -n +2 "$file" | while IFS=, read -r id title body labels milestone
            do
              echo "Checking $id"

              existing=$(gh issue list \
                --search "$id in:title" \
                --json title \
                -q '.[].title')

              if [[ "$existing" == *"$id"* ]]; then
                echo "Skipping existing issue: $id"
              else
                echo "Creating issue: $id"

                # Prepare labels
                label_list=$(echo "$labels" | tr ';' ',')
                IFS=',' read -ra arr <<< "$label_list"
                for lbl in "${arr[@]}"; do
                  lbl_trim=$(echo "$lbl" | xargs)
                  exists=$(gh label list --json name -q ".[] | select(.name==\"$lbl_trim\") | .name")
                  if [ -z "$exists" ]; then
                    echo "Creating missing label: $lbl_trim"
                    gh label create "$lbl_trim" --color "f29513"
                  fi
                done

                # Ensure milestone exists, get its number
                milestone_trim=$(echo "$milestone" | xargs)
                milestone_number=$(gh api \
                  repos/$REPO/milestones \
                  -q ".[] | select(.title==\"$milestone_trim\") | .number")

                if [ -z "$milestone_number" ]; then
                  echo "Creating missing milestone: $milestone_trim"
                  milestone_number=$(gh api \
                    repos/$REPO/milestones \
                    --method POST \
                    -f title="$milestone_trim" \
                    -q '.number')
                fi

                # Create the issue
                gh issue create \
                  --title "$id $title" \
                  --body "$body" \
                  --label "$label_list" \
                  --milestone "$milestone_trim"
              fi
            done
          done